<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;

    /* FOTO DE FONDO */
    background: url("fondo.jpg") no-repeat center center;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: flex-end;
}

.contenedor {
    text-align: center;
    margin-bottom: 240px;
    animation: aparecer 1.5s ease;
}

/* TEXTO SUPERIOR */
.titulo {
    font-size: 55px;
    color: #000000;
    font-weight: bold;
    margin-bottom: 25px;
    text-shadow: 2px 2px 8px rgba(255,255,255,0.5);
}

/* BOTÓN */
button {
    padding: 40px 90px;
    font-size: 45px;
    background: #D2B48C; /* Color arena */
    border: none;
    border-radius: 15px;
    cursor: pointer;
    color: #000000;
    font-weight: bold;

    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

/* EFECTO HOVER */
button:hover {
    transform: scale(1.1);
    background: #C8A97E;
}

/* EFECTO ENTRADA */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(80px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body onclick="activarAudio()">

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="contenedor">
    <div class="titulo">BIENVENIDOS</div>
    <button onclick="entrar()">ENTRA AQUÍ</button>
</div>

<script>
let audioActivado = false;

function activarAudio() {
    if (!audioActivado) {
        const audio = document.getElementById("musica");
        audio.play().catch(() => {});
        audioActivado = true;
    }
}

function entrar() {
    const audio = document.getElementById("musica");
    audio.play();

    window.open("https://fainvitaciones.com/karen-andrea-xv", "_blank");
}
</script>

</body>
</html>
